model:
  quantizer: vq
  input_dim: 10
  hidden_dim: 64
  z_dim: 4
  n_states: 20
  levels: null
  loss: smooth_l1
  commitment_cost: 0.25
  decay: 0.99
  min_count: 1.0
  l2_normalize: true
train:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 512
  max_epochs: 20
  patience: 5
  scheduler: none
  clip_grad_norm: 1.0
  seed: 1
  kmeans_init: true
  kmeans_seed: 0
  kmeans_init_batches: 8
data:
  processed_dir: data/processed/scop_ca5_v1
outputs:
  out_dir: outputs/models/scop_v2_default
