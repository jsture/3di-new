# SCOPe baseline training configuration for v2 model.
model:
  input_dim: 10
  hidden_dim: 64
  z_dim: 4
  n_states: 20
  norm: layernorm
  activation: silu
  quantizer: ema_vq
  quantizer_gradient: ste
  kmeans_init: true
loss:
  primary: smooth_l1
  commitment_weight: 0.25
  usage_weight: 0.0
  contrastive_weight: 0.0
  self_reconstruction_weight: 0.0
data:
  train_dir: data/processed/scop_ca5_v1
  val_dir: data/processed/scop_ca5_v1
  max_ca_dist: 5.0
  standardize_features: true
  sampler: random
  max_pairs_per_alignment: null
optimizer:
  type: adamw
  lr: 0.001
  weight_decay: 0.0001
  exclude_bias_and_norm_from_decay: true
  gradient_clip_val: 1.0
  warmup_steps: 500
  scheduler: cosine_by_total_steps
training:
  seed: 42
  precision: 32-true
  continuous_warmup_epochs: 0
  max_epochs: 20
  batch_size: 512
  accumulate_grad_batches: 1
  torch_compile: false
